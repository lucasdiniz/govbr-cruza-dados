<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
    <meta name="theme-color" content="#060a14">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TransparenciaPB">
    <meta name="format-detection" content="telephone=no">
    <title>{% block title %}TransparenciaPB{% endblock %} — TransparenciaPB</title>
    <meta name="description" content="{% block meta_description %}Transparencia e cruzamento de dados publicos dos 223 municipios da Paraiba.{% endblock %}">
    <meta property="og:site_name" content="TransparenciaPB">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:title" content="{% block og_title %}TransparenciaPB{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Transparencia e cruzamento de dados publicos dos 223 municipios da Paraiba.{% endblock %}">
    <meta property="og:locale" content="pt_BR">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="/static/style.css?v=13">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="apple-touch-icon" href="/static/logo.svg">
    {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="topnav">
        <a href="/" class="logo">
            <svg class="logo-mark" width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <rect x="3" y="4" width="16" height="20" rx="3" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
                <line x1="7" y1="10" x2="15" y2="10" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="7" y1="14" x2="13" y2="14" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="7" y1="18" x2="15" y2="18" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="22" cy="22" r="5.5" stroke="#60a5fa" stroke-width="2" fill="#060a14"/>
                <line x1="26" y1="26" x2="29.5" y2="29.5" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Transparencia<strong>PB</strong></span>
        </a>
        <span class="nav-desc">Transparencia e cruzamento de dados publicos &mdash; Paraiba</span>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <button type="button" id="backToTop" class="back-to-top" aria-label="Voltar ao topo" hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="/static/app.js?v=8"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js', { scope: '/' }).catch(() => null);
            });
        }
    </script>
</body>
</html>
