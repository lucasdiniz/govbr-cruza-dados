name: Setup Self-Hosted Runner

# Run this ONCE to install the GitHub Actions runner on your VM.
# After this, the Deploy workflow will run directly on the VM
# with full live logs and no time limits.
#
# Required secrets:
#   VM_HOST    - IP or hostname of the VM
#   VM_SSH_KEY - Private SSH key for the VM user (govbr)

on:
  workflow_dispatch:

env:
  VM_USER: govbr
  RUNNER_VERSION: "2.322.0"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Get runner registration token
        id: token
        run: |
          TOKEN=$(gh api -X POST "repos/${{ github.repository }}/actions/runners/registration-token" --jq '.token')
          echo "::add-mask::$TOKEN"
          echo "runner_token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install and register runner on VM
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << SCRIPT
            set -e

            RUNNER_DIR="/home/govbr/actions-runner"

            # Skip if runner is already running and registered
            if [ -f "\$RUNNER_DIR/.runner" ] && sudo systemctl is-active --quiet actions.runner.* 2>/dev/null; then
              echo "=== Runner already installed and running, skipping ==="
              sudo systemctl status actions.runner.* --no-pager || true
              exit 0
            fi

            echo "=== Installing GitHub Actions runner ==="

            # Download runner
            mkdir -p "\$RUNNER_DIR"
            cd "\$RUNNER_DIR"

            if [ ! -f "run.sh" ]; then
              curl -sL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" -o runner.tar.gz
              tar xzf runner.tar.gz
              rm -f runner.tar.gz
            fi

            # Unregister previous runner if exists (ignore errors)
            if [ -f ".runner" ]; then
              ./config.sh remove --token "${{ steps.token.outputs.runner_token }}" 2>/dev/null || true
            fi

            # Register
            ./config.sh --url "https://github.com/${{ github.repository }}" \
              --token "${{ steps.token.outputs.runner_token }}" \
              --name "azure-vm" \
              --labels "self-hosted,linux,azure" \
              --unattended --replace

            # Install and start as service
            sudo ./svc.sh install 2>/dev/null || true
            sudo ./svc.sh start

            echo "=== Runner installed and running ==="
            sudo ./svc.sh status
          SCRIPT

      - name: Verify runner is online
        run: |
          sleep 10
          RUNNER=$(gh api "repos/${{ github.repository }}/actions/runners" --jq '.runners[] | select(.name=="azure-vm") | .status')
          if [ "$RUNNER" = "online" ]; then
            echo "Runner is ONLINE"
          else
            echo "::warning::Runner status: $RUNNER (may take a minute to appear online)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## Self-Hosted Runner Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runner **azure-vm** installed on \`${{ secrets.VM_HOST }}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can now run the **Deploy to Azure VM** workflow." >> $GITHUB_STEP_SUMMARY
          echo "It will execute directly on the VM with full live logs and no time limits." >> $GITHUB_STEP_SUMMARY
