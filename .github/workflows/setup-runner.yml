name: Setup Self-Hosted Runner

# Run this to install OR repair the GitHub Actions runner on your VM.
# The workflow is intentionally idempotent: it can be re-run safely whenever
# the runner appears online in GitHub but stops picking queued jobs.
#
# Required secrets:
#   VM_HOST    - IP or hostname of the VM
#   VM_SSH_KEY - Private SSH key for the VM user (govbr)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

env:
  VM_USER: govbr
  RUNNER_VERSION: "2.322.0"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Get runner registration token
        id: token
        run: |
          TOKEN=$(gh api -X POST "repos/${{ github.repository }}/actions/runners/registration-token" --jq '.token')
          echo "::add-mask::$TOKEN"
          echo "runner_token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install and register runner on VM
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << SCRIPT
            set -e

            RUNNER_DIR="/home/govbr/actions-runner"
            REPO_URL="https://github.com/${{ github.repository }}"

            runner_service_name() {
              if [ -d "\$RUNNER_DIR/.service" ]; then
                find "\$RUNNER_DIR/.service" -maxdepth 1 -type f -name '*.service' -printf '%f\n' | head -n1
              fi
            }

            service_status() {
              local svc="\$(runner_service_name)"
              if [ -n "\$svc" ]; then
                sudo systemctl is-active "\$svc" 2>/dev/null || true
              else
                echo "missing"
              fi
            }

            echo "=== Ensuring GitHub Actions runner is installed and healthy ==="

            # Download runner
            mkdir -p "\$RUNNER_DIR"
            cd "\$RUNNER_DIR"

            if [ ! -f "run.sh" ]; then
              curl -sL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" -o runner.tar.gz
              tar xzf runner.tar.gz
              rm -f runner.tar.gz
            fi

            # Stop existing service if present. A runner can appear "online" in GitHub
            # while the local listener is wedged and no longer pulling jobs.
            EXISTING_SVC="\$(runner_service_name)"
            if [ -n "\$EXISTING_SVC" ]; then
              echo "=== Existing runner service: \$EXISTING_SVC (\$(service_status)) ==="
              sudo systemctl stop "\$EXISTING_SVC" 2>/dev/null || true
              sudo systemctl disable "\$EXISTING_SVC" 2>/dev/null || true
            fi

            # Remove previous registration if exists. Re-registering on every run is cheap
            # and avoids stale or half-broken registrations on the GitHub side.
            if [ -f ".runner" ]; then
              ./config.sh remove --token "${{ steps.token.outputs.runner_token }}" 2>/dev/null || true
            fi

            # Register
            ./config.sh --url "\$REPO_URL" \
              --token "${{ steps.token.outputs.runner_token }}" \
              --name "azure-vm" \
              --labels "self-hosted,linux,azure" \
              --unattended --replace

            # Install and start as service
            sudo ./svc.sh uninstall 2>/dev/null || true
            sudo ./svc.sh install
            sudo ./svc.sh start

            NEW_SVC="\$(runner_service_name)"
            echo "=== Runner service after repair: \$NEW_SVC ==="
            sudo ./svc.sh status || true
            if [ -n "\$NEW_SVC" ]; then
              sudo systemctl --no-pager --full status "\$NEW_SVC" || true
            fi
          SCRIPT

      - name: Verify runner is online
        run: |
          sleep 15
          RUNNER_JSON=$(gh api "repos/${{ github.repository }}/actions/runners" --jq '.runners[] | select(.name=="azure-vm")')
          STATUS=$(echo "$RUNNER_JSON" | jq -r '.status // ""')
          BUSY=$(echo "$RUNNER_JSON" | jq -r '.busy // false')
          if [ "$STATUS" = "online" ]; then
            echo "Runner is ONLINE"
            echo "Runner busy: $BUSY"
          else
            echo "::warning::Runner status: $STATUS (may take a minute to appear online)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## Self-Hosted Runner Setup / Repair" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runner **azure-vm** installed or repaired on \`${{ secrets.VM_HOST }}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can safely re-run this workflow whenever the self-hosted runner stops pulling queued jobs." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "After this, run the **Deploy to Azure VM** workflow." >> $GITHUB_STEP_SUMMARY
          echo "It will execute directly on the VM with full live logs and no time limits." >> $GITHUB_STEP_SUMMARY
