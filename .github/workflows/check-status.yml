name: Check ETL Status

on:
  workflow_dispatch:

env:
  VM_USER: govbr

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Check ETL status
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << 'SCRIPT'
            echo "========================================="
            echo "  ETL Status Report"
            echo "========================================="
            echo ""

            # Check PID
            if [ -f /tmp/etl.pid ]; then
              PID=$(cat /tmp/etl.pid)
              if kill -0 $PID 2>/dev/null; then
                ELAPSED=$(ps -o etimes= -p $PID | tr -d ' ')
                HOURS=$((ELAPSED / 3600))
                MINS=$(( (ELAPSED % 3600) / 60 ))
                echo "STATUS: RUNNING (PID $PID, ${HOURS}h${MINS}m elapsed)"
              else
                if [ -f /tmp/etl.exit ]; then
                  EXIT_CODE=$(cat /tmp/etl.exit)
                  if [ "$EXIT_CODE" = "0" ]; then
                    echo "STATUS: COMPLETED SUCCESSFULLY"
                  else
                    echo "STATUS: FAILED (exit code $EXIT_CODE)"
                  fi
                else
                  echo "STATUS: CRASHED (no exit code recorded)"
                fi
              fi
            else
              echo "STATUS: NO ETL RUNNING (no PID file)"
            fi

            echo ""
            echo "========================================="
            echo "  Disk Usage"
            echo "========================================="
            df -h / /data 2>/dev/null || df -h /

            echo ""
            echo "========================================="
            echo "  Database Tables"
            echo "========================================="
            cd /home/govbr/govbr-project 2>/dev/null && source .env 2>/dev/null || true
            PGPASSWORD="${POSTGRES_PASSWORD}" psql -U govbr -d govbr -c "
              SELECT relname AS table_name,
                     pg_size_pretty(pg_total_relation_size(c.oid)) AS size,
                     reltuples::bigint AS approx_rows
              FROM pg_class c
              JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname = 'public' AND c.relkind IN ('r', 'm')
              ORDER BY pg_total_relation_size(c.oid) DESC
              LIMIT 30;
            " 2>/dev/null || echo "(database not ready)"

            echo ""
            echo "========================================="
            echo "  ETL Log (last 80 lines)"
            echo "========================================="
            if [ -f /tmp/etl.log ]; then
              tail -80 /tmp/etl.log
            else
              echo "(no log file)"
            fi
          SCRIPT

      - name: Summary
        if: always()
        run: |
          echo "## ETL Status" >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Check ETL status' step output for full details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To see live logs, SSH into the VM:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ssh govbr@<VM_HOST> tail -f /tmp/etl.log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
