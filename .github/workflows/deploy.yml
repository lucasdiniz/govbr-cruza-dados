name: Deploy to Azure VM

# Runs directly on the VM via self-hosted runner (installed by setup-runner.yml).
# Full live logs with the GitHub self-hosted runner max timeout (5 days / 7200 min).
#
# Required secrets:
#   DB_PASSWORD - PostgreSQL password
#   ENV_FILE    - Contents of .env file
#
# First-time setup:
#   1. Create an Ubuntu VM (tested on Azure Standard_D4s_v3, 16GB RAM)
#   2. Attach a data disk mounted at /data (400GB+)
#   3. Create user 'govbr' with SSH key access
#   4. Set repo secrets: VM_HOST, VM_SSH_KEY, DB_PASSWORD, ENV_FILE
#   5. Run the "Setup Self-Hosted Runner" workflow (once)
#   6. Run this workflow with etl_phase=all

on:
  workflow_dispatch:
    inputs:
      etl_phase:
        description: 'ETL phase: "sql" (schema+views only), phase number (e.g. "17"), or "all" (full ETL)'
        required: false
        default: 'all'
      clean:
        description: 'Clean previous failed state before deploying'
        required: false
        type: boolean
        default: false
      skip_download:
        description: 'Skip download phase (use pre-uploaded data in DATA_DIR)'
        required: false
        type: boolean
        default: false

env:
  PROJECT_DIR: /home/govbr/govbr-project

jobs:
  deploy:
    runs-on: [self-hosted, linux, azure]
    timeout-minutes: 7200  # GitHub self-hosted runner hard limit (5 days)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Clean previous failed state (manual trigger only) ──
      - name: Clean previous state
        if: inputs.clean == true
        run: |
          set -e
          echo "=== Cleaning previous deploy state ==="
          rm -f ${{ env.PROJECT_DIR }}/.initialized
          if command -v psql &> /dev/null; then
            cd ${{ env.PROJECT_DIR }} && source .env 2>/dev/null || true
            PGPASSWORD="${POSTGRES_PASSWORD:-${{ secrets.DB_PASSWORD }}}" psql -U govbr -d govbr -c "
              DO \$\$ DECLARE r RECORD;
              BEGIN
                FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                  EXECUTE 'DROP TABLE IF EXISTS ' || quote_ident(r.tablename) || ' CASCADE';
                END LOOP;
              END \$\$;
            " || true
          fi
          echo "=== Clean complete ==="

      # ── Install PostgreSQL 16 + system deps ──
      - name: Install system dependencies
        run: |
          set -e

          # Python + git + tor
          if ! dpkg -s python3-venv >/dev/null 2>&1 || ! dpkg -s tor >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y python3-venv python3-pip git curl wget gnupg2 lsb-release tor torsocks
            sudo systemctl enable tor
            sudo systemctl start tor
          fi
          sudo systemctl start tor 2>/dev/null || true

          # PostgreSQL 16
          if ! dpkg -s postgresql-16 >/dev/null 2>&1; then
            echo "=== Installing PostgreSQL 16 ==="
            sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
            sudo apt update
            sudo apt install -y postgresql-16 postgresql-contrib-16

            # Move data dir to /data disk if available (OS disk is only 30GB)
            if mountpoint -q /data 2>/dev/null; then
              sudo systemctl stop postgresql
              sudo mkdir -p /data/postgresql/16/main
              sudo chown -R postgres:postgres /data/postgresql
              sudo rsync -av /var/lib/postgresql/16/main/ /data/postgresql/16/main/
              sudo sed -i "s|data_directory = '/var/lib/postgresql/16/main'|data_directory = '/data/postgresql/16/main'|" /etc/postgresql/16/main/postgresql.conf
              sudo systemctl start postgresql
              echo "=== PG data dir moved to /data ==="
            fi

            # Create user + database
            sudo -u postgres createuser -s govbr 2>/dev/null || true
            sudo -u postgres createdb -O govbr govbr 2>/dev/null || true
            sudo -u postgres psql -c "ALTER USER govbr WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            sudo -u postgres psql -d govbr -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

            # Tuning for 16GB RAM
            echo -e "shared_buffers = 4GB\neffective_cache_size = 12GB\nwork_mem = 512MB\nmaintenance_work_mem = 1GB\nmax_wal_size = 4GB\ncheckpoint_completion_target = 0.9\nrandom_page_cost = 1.1" | sudo tee /etc/postgresql/16/main/conf.d/tuning.conf > /dev/null

            sudo sed -i 's/local\s\+all\s\+all\s\+peer/local all all md5/' /etc/postgresql/16/main/pg_hba.conf
            sudo systemctl restart postgresql
            echo "=== PostgreSQL 16 installed ==="
          fi
          sudo systemctl start postgresql

      # ── Deploy code + install Python deps ──
      - name: Deploy code
        run: |
          set -e

          # Clone if missing
          if [ ! -d "${{ env.PROJECT_DIR }}/.git" ]; then
            cd /home/govbr
            git clone https://github.com/${{ github.repository }}.git govbr-project
          fi

          cd ${{ env.PROJECT_DIR }}

          # Write .env from secrets
          echo "${{ secrets.ENV_FILE }}" > .env

          # Ensure data dir
          source .env
          DATA="${DATA_DIR:-/data/raw-data}"
          mkdir -p "$DATA"

          # Pull latest
          git fetch origin main
          git reset --hard origin/main

          # Python venv
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install --upgrade pip -q
          pip install -e ".[web]" -q

          echo "=== Code deployed. Data dir: $DATA ==="

      # ── Verify disk space ──
      - name: Verify disk space
        run: |
          set -e
          echo "=== Disk status ==="
          df -h / /data 2>/dev/null || df -h /

          if mountpoint -q /data 2>/dev/null; then
            AVAIL_GB=$(df --output=avail /data | tail -1 | awk '{print int($1/1048576)}')
          else
            AVAIL_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
          fi

          echo "Available: ${AVAIL_GB}GB"
          if [ "$AVAIL_GB" -lt 50 ]; then
            echo "::error::Insufficient disk space: ${AVAIL_GB}GB (need 50GB+)"
            exit 1
          fi

      # ── Test download connectivity ──
      - name: Test download sources
        continue-on-error: true
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          systemctl is-active tor >/dev/null 2>&1 \
            && echo "  Tor service: ACTIVE" \
            || echo "  Tor service: INACTIVE"
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          python -m etl.probe_sources

      # ── Full ETL (first run or etl_phase=all) ──
      - name: "ETL: Full pipeline"
        if: inputs.etl_phase == 'all'
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate

          if [ -f ".initialized" ]; then
            echo "Already initialized — running incremental ETL"
          fi

          SKIP_DL="${{ inputs.skip_download }}"
          if [ "$SKIP_DL" = "true" ]; then
            echo "=== Skipping download, starting from phase 2 ==="
            python -m etl.run_all 2 2>&1
          else
            echo "=== Full ETL ==="
            python -m etl.run_all 2>&1
          fi

          # Verify key tables exist
          if python3 -c "from etl.db import get_conn, table_count; conn = get_conn(); n = table_count(conn, 'empresa'); print(f'empresa: {n}'); exit(0 if n > 0 else 1)" 2>/dev/null; then
            touch .initialized
            echo "=== ETL complete ==="
          else
            echo "::error::ETL incomplete — key tables missing"
            python -m etl.verify 2>/dev/null || true
            exit 1
          fi

      # ── SQL only (schema + indices + views) ──
      - name: "ETL: SQL only"
        if: inputs.etl_phase == 'sql'
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== Applying SQL changes ==="
          python -m etl.01_schema 2>&1 || true
          python -m etl.10_indices 2>&1 || true
          python -m etl.15_normalizar 2>&1 || true
          python -m etl.21_views 2>&1 || true

      # ── Specific phase ──
      - name: "ETL: Phase ${{ inputs.etl_phase }}"
        if: inputs.etl_phase != 'sql' && inputs.etl_phase != 'all'
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== ETL from phase ${{ inputs.etl_phase }} ==="
          python -m etl.run_all "${{ inputs.etl_phase }}" 2>&1

      # ── Run fraud queries ──
      - name: Run queries
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== Running all queries ==="
          python -m etl.run_queries 2>&1 | tail -100

      # ── Deploy web services ──
      - name: Deploy web frontend and cache warmer
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}

          # Install systemd services
          sudo cp deploy/cruza-web.service /etc/systemd/system/
          sudo cp deploy/cruza-warm-cache.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable cruza-web cruza-warm-cache

          # Restart services to pick up new code
          sudo systemctl restart cruza-web
          sudo systemctl restart cruza-warm-cache

          echo "=== Web services deployed ==="
          systemctl is-active cruza-web && echo "cruza-web: RUNNING" || echo "cruza-web: FAILED"
          systemctl is-active cruza-warm-cache && echo "cruza-warm-cache: RUNNING" || echo "cruza-warm-cache: FAILED"

      # ── Verify ──
      - name: Verify database
        if: always()
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          python3 -m etl.verify 2>/dev/null || echo "Verify script not available"
