name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      etl_phase:
        description: 'ETL phase to run ("17", "all", or "sql")'
        required: false
        default: 'sql'

env:
  VM_USER: govbr
  PROJECT_DIR: /home/govbr/govbr-project

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy + Setup
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << EOF
            set -e

            if ! dpkg -s python3-venv >/dev/null 2>&1; then
              sudo apt update
              sudo apt install -y python3-venv python3-pip git
            fi

            if [ ! -d "${{ env.PROJECT_DIR }}/.git" ]; then
              cd /home/${{ env.VM_USER }}
              git clone https://github.com/lucasdiniz/govbr-cruza-dados.git govbr-project
            fi

            cd ${{ env.PROJECT_DIR }}
            git fetch origin main
            git reset --hard origin/main

            if [ ! -d "venv" ]; then
              python3 -m venv venv
              source venv/bin/activate
              pip install --upgrade pip
              pip install -r requirements.txt
            fi
          EOF

      - name: Apply SQL schema + indexes + views
        if: inputs.etl_phase == 'sql' || inputs.etl_phase == ''
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << EOF
            set -e
            cd ${{ env.PROJECT_DIR }}
            source venv/bin/activate

            python -m etl.01_schema
            python -m etl.10_indices 2>&1 || true
            python -m etl.21_views
          EOF

      - name: Run ETL from phase
        if: inputs.etl_phase != 'sql' && inputs.etl_phase != ''
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << EOF
            set -e
            cd ${{ env.PROJECT_DIR }}
            source venv/bin/activate

            if [ "${{ inputs.etl_phase }}" = "all" ]; then
              python -m etl.run_all 2>&1 | tee /tmp/etl.log
            else
              python -m etl.run_all ${{ inputs.etl_phase }} 2>&1 | tee /tmp/etl.log
            fi
          EOF

      - name: Verify database
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << EOF
            set -e
            cd ${{ env.PROJECT_DIR }}
            source venv/bin/activate

            python -c "from etl.db import get_conn, table_count; conn = get_conn(); tables = ['empresa','estabelecimento','socio','pncp_contratacao','pncp_contrato']; [print(f'{t}: {table_count(conn, t):,}') if not isinstance(table_count(conn, t), Exception) else print(f'{t}: error') for t in tables]; conn.close()"
          EOF
