name: Deploy to Azure VM

on:
  workflow_dispatch:
    inputs:
      etl_phase:
        description: 'ETL phase: "sql" (schema+views only), phase number (e.g. "17"), or "all" (full ETL)'
        required: false
        default: 'all'
      clean:
        description: 'Clean previous failed state before deploying'
        required: false
        type: boolean
        default: false
      skip_download:
        description: 'Skip download phase (use pre-uploaded data in DATA_DIR)'
        required: false
        type: boolean
        default: false

# Required secrets:
#   VM_HOST        - IP or hostname of the Azure VM
#   VM_SSH_KEY     - Private SSH key for the VM user (govbr)
#   DB_PASSWORD    - PostgreSQL password
#   ENV_FILE       - Contents of the .env file for the project

env:
  VM_USER: govbr
  PROJECT_DIR: /home/govbr/govbr-project

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Setup only — ETL runs detached on VM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      # ── Clean previous failed state (manual trigger only) ──
      - name: Clean previous state
        if: inputs.clean == true
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << 'SCRIPT'
            set -e
            echo "=== Cleaning previous deploy state ==="
            rm -f /home/govbr/govbr-project/.initialized
            rm -f /tmp/etl.pid /tmp/etl.log /tmp/etl.exit
            if command -v psql &> /dev/null; then
              cd /home/govbr/govbr-project && source .env 2>/dev/null || true
              PGPASSWORD="${POSTGRES_PASSWORD}" psql -U govbr -d govbr -c "
                DO \$\$ DECLARE r RECORD;
                BEGIN
                  FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                    EXECUTE 'DROP TABLE IF EXISTS ' || quote_ident(r.tablename) || ' CASCADE';
                  END LOOP;
                END \$\$;
              " 2>/dev/null || true
            fi
            echo "=== Clean complete ==="
          SCRIPT

      # ── Install system deps + PostgreSQL 16 ──
      - name: Install system dependencies
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << 'SCRIPT'
            set -e

            # Python + git + tor
            if ! dpkg -s python3-venv >/dev/null 2>&1 || ! dpkg -s tor >/dev/null 2>&1; then
              sudo apt update
              sudo apt install -y python3-venv python3-pip git curl wget gnupg2 lsb-release tor torsocks
              sudo systemctl enable tor
              sudo systemctl start tor
            fi
            sudo systemctl start tor 2>/dev/null || true

            # PostgreSQL 16
            if ! dpkg -s postgresql-16 >/dev/null 2>&1; then
              echo "=== Installing PostgreSQL 16 ==="
              sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
              wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
              sudo apt update
              sudo apt install -y postgresql-16 postgresql-contrib-16

              # Move data dir to /data disk if available (OS disk is only 30GB)
              if mountpoint -q /data 2>/dev/null; then
                sudo systemctl stop postgresql
                sudo mkdir -p /data/postgresql/16/main
                sudo chown -R postgres:postgres /data/postgresql
                sudo rsync -av /var/lib/postgresql/16/main/ /data/postgresql/16/main/
                sudo sed -i "s|data_directory = '/var/lib/postgresql/16/main'|data_directory = '/data/postgresql/16/main'|" /etc/postgresql/16/main/postgresql.conf
                sudo systemctl start postgresql
                echo "=== PG data dir moved to /data ==="
              fi

              # Create user + database
              sudo -u postgres createuser -s govbr 2>/dev/null || true
              sudo -u postgres createdb -O govbr govbr 2>/dev/null || true
              sudo -u postgres psql -d govbr -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

              # Tuning for 16GB RAM
              echo -e "shared_buffers = 4GB\neffective_cache_size = 12GB\nwork_mem = 512MB\nmaintenance_work_mem = 1GB\nmax_wal_size = 4GB\ncheckpoint_completion_target = 0.9\nrandom_page_cost = 1.1" | sudo tee /etc/postgresql/16/main/conf.d/tuning.conf > /dev/null

              # Allow local connections with password
              sudo sed -i 's/local\s\+all\s\+all\s\+peer/local all all md5/' /etc/postgresql/16/main/pg_hba.conf
              sudo systemctl restart postgresql
              echo "=== PostgreSQL 16 installed ==="
            fi
            sudo systemctl start postgresql
          SCRIPT

      # ── Set DB password (idempotent) ──
      - name: Configure database password
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << SCRIPT
            sudo -u postgres psql -c "ALTER USER govbr WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
          SCRIPT

      # ── Deploy code + install Python deps ──
      - name: Deploy code
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << SCRIPT
            set -e

            # Clone if missing
            if [ ! -d "/home/govbr/govbr-project/.git" ]; then
              cd /home/govbr
              git clone https://github.com/${{ github.repository }}.git govbr-project
            fi

            cd /home/govbr/govbr-project

            # Write .env from secrets
            cat > .env << 'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

            # Ensure data dir
            source .env
            DATA="\${DATA_DIR:-/data/raw-data}"
            mkdir -p "\$DATA"

            # Pull latest
            git fetch origin main
            git reset --hard origin/main

            # Python venv
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -e . -q

            echo "=== Code deployed ==="
          SCRIPT

      # ── Verify disk space ──
      - name: Verify disk space
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << 'SCRIPT'
            set -e
            echo "=== Disk status ==="
            df -h / /data 2>/dev/null || df -h /

            if mountpoint -q /data 2>/dev/null; then
              AVAIL_GB=$(df --output=avail /data | tail -1 | awk '{print int($1/1048576)}')
            else
              AVAIL_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
            fi

            echo "Available: ${AVAIL_GB}GB"
            if [ "$AVAIL_GB" -lt 50 ]; then
              echo "::error::Insufficient disk space: ${AVAIL_GB}GB (need 50GB+)"
              exit 1
            fi
          SCRIPT

      # ── Launch ETL as detached process on the VM ──
      # The ETL can take 10-24h (PNCP API alone is ~10h).
      # We launch it via nohup so it survives SSH disconnect.
      # Use "Check ETL Status" workflow to monitor progress.
      - name: Launch ETL
        run: |
          PHASE="${{ inputs.etl_phase }}"
          SKIP_DL="${{ inputs.skip_download }}"

          ssh ${{ env.VM_USER }}@${{ secrets.VM_HOST }} << SCRIPT
            set -e
            cd /home/govbr/govbr-project

            # Kill any previous ETL still running
            if [ -f /tmp/etl.pid ] && kill -0 \$(cat /tmp/etl.pid) 2>/dev/null; then
              echo "Killing previous ETL (PID \$(cat /tmp/etl.pid))..."
              kill \$(cat /tmp/etl.pid) 2>/dev/null || true
              sleep 2
            fi
            rm -f /tmp/etl.pid /tmp/etl.exit

            # Build the ETL command
            source venv/bin/activate

            if [ "$PHASE" = "sql" ]; then
              # SQL-only: schema + indices + views (fast, runs inline)
              echo "=== Applying SQL changes ==="
              python -m etl.01_schema 2>&1 || true
              python -m etl.10_indices 2>&1 || true
              python -m etl.15_normalizar 2>&1 || true
              python -m etl.21_views 2>&1 || true
              echo "=== SQL applied ==="
              exit 0
            fi

            # For 'all' or specific phase: run detached
            ETL_CMD="source /home/govbr/govbr-project/venv/bin/activate && cd /home/govbr/govbr-project"

            if [ "$PHASE" = "all" ]; then
              if [ "$SKIP_DL" = "true" ]; then
                ETL_CMD="\$ETL_CMD && python -m etl.run_all 2"
              else
                ETL_CMD="\$ETL_CMD && python -m etl.run_all"
              fi
            else
              ETL_CMD="\$ETL_CMD && python -m etl.run_all $PHASE"
            fi

            # Add queries + verify at the end
            ETL_CMD="\$ETL_CMD && python -m etl.run_queries && python -m etl.verify"

            # Launch detached
            echo "=== Launching ETL (detached) ==="
            echo "Command: \$ETL_CMD"
            nohup bash -c "\$ETL_CMD; echo \\\$? > /tmp/etl.exit" > /tmp/etl.log 2>&1 &
            echo \$! > /tmp/etl.pid
            echo "ETL started with PID \$(cat /tmp/etl.pid)"
            echo "Monitor with: 'Check ETL Status' workflow or SSH + tail -f /tmp/etl.log"

            # Wait a few seconds to catch immediate failures
            sleep 5
            if ! kill -0 \$(cat /tmp/etl.pid) 2>/dev/null; then
              echo "::error::ETL process died immediately. Last 50 lines:"
              tail -50 /tmp/etl.log
              exit 1
            fi
            echo "=== ETL running in background ==="
          SCRIPT

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **VM**: ${{ secrets.VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Phase**: ${{ inputs.etl_phase }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip download**: ${{ inputs.skip_download }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.etl_phase }}" = "sql" ]; then
            echo "SQL changes applied inline. Done." >> $GITHUB_STEP_SUMMARY
          else
            echo "ETL launched as background process on the VM." >> $GITHUB_STEP_SUMMARY
            echo "Use the **Check ETL Status** workflow to monitor progress." >> $GITHUB_STEP_SUMMARY
            echo "Or SSH into the VM and run: \`tail -f /tmp/etl.log\`" >> $GITHUB_STEP_SUMMARY
          fi
