name: Deploy to Azure VM

# Pipeline em 3 jobs:
#   1. preflight  (github-hosted, OIDC) — resize VM up se etl_phase != web
#   2. deploy     (self-hosted na VM) — ETL/SQL/web
#   3. postflight (github-hosted, OIDC) — resize VM down se etl_phase != web
#
# Required secrets:
#   DB_PASSWORD            - PostgreSQL password
#   ENV_FILE               - Contents of .env file
#   VM_HOST                - VM IP/hostname (used pelo preflight pra checar SSH)
#   AZURE_CLIENT_ID        - OIDC: app registration clientId
#   AZURE_TENANT_ID        - OIDC: tenant
#   AZURE_SUBSCRIPTION_ID  - OIDC: subscription com a VM
#
# First-time setup:
#   1. Create an Ubuntu VM (tested on Azure Standard_B4as_v2, 16GB RAM)
#   2. Attach a data disk mounted at /data (400GB+)
#   3. Create user 'govbr' with SSH key access
#   4. Set repo secrets above (DB_PASSWORD, ENV_FILE, VM_HOST, AZURE_*)
#   5. Run the "Setup Self-Hosted Runner" workflow (once)
#   6. Run this workflow with etl_phase=all

on:
  workflow_dispatch:
    inputs:
      etl_phase:
        description: 'ETL phase: "web" (code sync + web deploy only), "sql" (schema+views), phase number (e.g. "18"), or "all" (full ETL)'
        required: false
        default: 'all'
      clean:
        description: 'Clean previous failed state before deploying'
        required: false
        type: boolean
        default: false
      skip_download:
        description: 'Skip download phase (use pre-uploaded data in DATA_DIR)'
        required: false
        type: boolean
        default: false
      warm_cache:
        description: 'Roda warm_cache (1 ciclo, ~20h em B4). AUTO apos etl_phase!=web. Para etl_phase=web use este input. Forca preflight=B4 + downsize no fim.'
        required: false
        type: boolean
        default: false
      run_queries:
        description: 'Roda etl.run_queries (analises de fraude, ~30min). Default false — relatorios/ podem ser regerados localmente.'
        required: false
        type: boolean
        default: false
      drop_cache:
        description: 'TRUNCATE web_cache antes do warm. Use APENAS em mudancas de schema. Por padrao (false), cache antigo eh preservado e UPSERT-ado (evita 12-18h sem cache).'
        required: false
        type: boolean
        default: false
      invalidate_cache_keys:
        description: 'Lista CSV de prefixos/substrings de query_id para DELETE cirurgico no web_cache (ex: "PERFIL,KPI_SUMMARY,TOP_SERVIDORES"). Aplica DELETE WHERE query_id LIKE "%term%" para cada termo. Usado quando uma fix afeta so algumas queries — evita drop_cache=true full. Apenas [a-zA-Z0-9_:] permitidos por seguranca.'
        required: false
        type: string
        default: ''

# OIDC federado pro Azure (sem secrets de SP, sem expiracao).
permissions:
  id-token: write
  contents: read

# Lock global: apenas 1 run em voo por vez nessa VM. Sem isso, dois disparos
# concorrentes podem fazer az vm deallocate/resize um sobre o outro e quebrar o
# banco (que leva DIAS para reconstruir do zero).
concurrency:
  group: deploy-vm-govbr
  cancel-in-progress: false

env:
  PROJECT_DIR: /home/govbr/govbr-project
  AZURE_RG: RG-GOVBR-NCUS
  AZURE_VM: vm-govbr
  # B2as_v2: 2 vCPU, 8GB  ~$55/mes  — adequado para servir web
  # B4as_v2: 4 vCPU, 16GB ~$108/mes — necessario para ETL/views pesados
  VM_SIZE_WEB: Standard_B2as_v2
  VM_SIZE_ETL: Standard_B4as_v2
  # Disco de dados (PostgreSQL ~248GB).
  # Standard SSD E20: ~$38/mes, 500 IOPS, 100 MB/s — ok para servir web.
  # Premium SSD P20:  ~$73/mes, 2300 IOPS, 150 MB/s + ReadOnly host caching
  # (~4GB RAM da host como cache) — necessario para ETL/warm pesados.
  # Como o disco eh cobrado POR HORA, swappar StandardSSD<->Premium nas
  # transicoes de tamanho da VM custa ~$0.05/h extra durante operacoes
  # pesadas, em vez de $35/mes always-on.
  DATA_DISK: disk-govbr-data
  DISK_SKU_LIGHT: StandardSSD_LRS
  DISK_SKU_HEAVY: Premium_LRS

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # PREFLIGHT: redimensiona a VM para o tamanho adequado ao etl_phase
  # ─────────────────────────────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      target_size: ${{ steps.decide.outputs.target_size }}
      target_disk_sku: ${{ steps.decide.outputs.target_disk_sku }}
    steps:
      - name: Decide target VM size and disk SKU
        id: decide
        run: |
          # Resize UP para B4 (16GB) sempre que houver trabalho pesado:
          #   - qualquer etl_phase != web (ETL/SQL/N usam mais RAM e CPU)
          #   - warm_cache=true (1 ciclo de warm leva ~20h, beneficia muito de B4)
          # Caso contrario (etl_phase=web sem warm), mantem B2 (8GB) para economizar.
          # Disco segue a VM: Premium para trabalho pesado, Standard para web.
          if [ "${{ inputs.etl_phase }}" = "web" ] && [ "${{ inputs.warm_cache }}" != "true" ]; then
            echo "target_size=${{ env.VM_SIZE_WEB }}" >> "$GITHUB_OUTPUT"
            echo "target_disk_sku=${{ env.DISK_SKU_LIGHT }}" >> "$GITHUB_OUTPUT"
            echo "etl_phase=web warm_cache=false → B2 + Standard SSD (web)"
          else
            echo "target_size=${{ env.VM_SIZE_ETL }}" >> "$GITHUB_OUTPUT"
            echo "target_disk_sku=${{ env.DISK_SKU_HEAVY }}" >> "$GITHUB_OUTPUT"
            echo "trabalho pesado → B4 + Premium SSD (16GB, 2300 IOPS)"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resize VM and convert data disk SKU
        run: |
          set -e
          TARGET_SIZE="${{ steps.decide.outputs.target_size }}"
          TARGET_DISK_SKU="${{ steps.decide.outputs.target_disk_sku }}"

          CURRENT_SIZE=$(az vm show -g "$AZURE_RG" -n "$AZURE_VM" --query hardwareProfile.vmSize -o tsv)
          CURRENT_DISK_SKU=$(az disk show -g "$AZURE_RG" -n "$DATA_DISK" --query sku.name -o tsv)
          CURRENT_CACHING=$(az vm show -g "$AZURE_RG" -n "$AZURE_VM" --query "storageProfile.dataDisks[?name=='$DATA_DISK'].caching | [0]" -o tsv)
          POWER=$(az vm get-instance-view -g "$AZURE_RG" -n "$AZURE_VM" \
            --query "instanceView.statuses[?contains(code, 'PowerState')].code | [0]" -o tsv)

          echo "Current VM size:   $CURRENT_SIZE"
          echo "Target VM size:    $TARGET_SIZE"
          echo "Current disk SKU:  $CURRENT_DISK_SKU"
          echo "Target disk SKU:   $TARGET_DISK_SKU"
          echo "Current caching:   $CURRENT_CACHING"
          echo "Power state:       $POWER"

          # Decide se algum trabalho eh necessario (idempotencia: skip se ja correto)
          NEEDS_RESIZE="false"
          NEEDS_DISK_CHANGE="false"
          NEEDS_CACHING_FIX="false"
          [ "$CURRENT_SIZE" != "$TARGET_SIZE" ] && NEEDS_RESIZE="true"
          [ "$CURRENT_DISK_SKU" != "$TARGET_DISK_SKU" ] && NEEDS_DISK_CHANGE="true"
          # ReadOnly caching no data disk acelera muito leituras de pgfn_divida
          # e tce_pb_despesa (host caching ~4GB RAM da maquina hospedeira).
          # Idempotente: setado uma vez, persiste.
          [ "$CURRENT_CACHING" != "ReadOnly" ] && NEEDS_CACHING_FIX="true"

          if [ "$NEEDS_RESIZE" = "false" ] && [ "$NEEDS_DISK_CHANGE" = "false" ] && [ "$NEEDS_CACHING_FIX" = "false" ]; then
            echo "Tudo ja esta no estado correto."
            if [ "$POWER" != "PowerState/running" ]; then
              echo "VM esta $POWER, ligando..."
              az vm start -g "$AZURE_RG" -n "$AZURE_VM"
            fi
          else
            # Valida disponibilidade do tamanho ANTES de deallocate
            if [ "$NEEDS_RESIZE" = "true" ]; then
              AVAILABLE=$(az vm list-vm-resize-options -g "$AZURE_RG" -n "$AZURE_VM" --query "[].name" -o tsv)
              if ! echo "$AVAILABLE" | grep -qx "$TARGET_SIZE"; then
                echo "::error::Tamanho $TARGET_SIZE indisponivel."
                echo "Disponiveis:"; echo "$AVAILABLE"
                exit 1
              fi
            fi

            # VM precisa ser deallocated para: resize, disk SKU change, e mudanca de caching.
            echo "Deallocating VM..."
            az vm deallocate -g "$AZURE_RG" -n "$AZURE_VM"

            # 1. Resize VM (com rollback)
            if [ "$NEEDS_RESIZE" = "true" ]; then
              echo "Resize VM: $CURRENT_SIZE → $TARGET_SIZE"
              if ! az vm resize -g "$AZURE_RG" -n "$AZURE_VM" --size "$TARGET_SIZE"; then
                echo "::warning::Resize VM falhou, restaurando para $CURRENT_SIZE..."
                az vm resize -g "$AZURE_RG" -n "$AZURE_VM" --size "$CURRENT_SIZE" || true
                az vm start -g "$AZURE_RG" -n "$AZURE_VM" || true
                echo "::error::Resize VM para $TARGET_SIZE falhou — VM restaurada"
                exit 1
              fi
            fi

            # 2. Convert disk SKU. Azure limita a 2 mudancas por disco/24h —
            # se atingir o limite, prossegue com o disco atual (warm rodara
            # mais lento mas funciona).
            if [ "$NEEDS_DISK_CHANGE" = "true" ]; then
              echo "Disk SKU: $CURRENT_DISK_SKU → $TARGET_DISK_SKU"
              if ! az disk update -g "$AZURE_RG" -n "$DATA_DISK" --sku "$TARGET_DISK_SKU"; then
                echo "::warning::Conversao de disco falhou (provavelmente atingiu limite 2/24h)."
                echo "::warning::Prosseguindo com SKU atual: $CURRENT_DISK_SKU"
                echo "::warning::Performance pode ser inferior ao esperado."
              fi
            fi

            # 3. Set caching ReadOnly no data disk (idempotente).
            #    Azure CLI moderno: az vm update aceita `--set` no path do storageProfile.
            if [ "$NEEDS_CACHING_FIX" = "true" ]; then
              echo "Setting caching to ReadOnly on $DATA_DISK..."
              # Encontra o LUN do disco para usar no --set
              LUN=$(az vm show -g "$AZURE_RG" -n "$AZURE_VM" --query "storageProfile.dataDisks[?name=='$DATA_DISK'].lun | [0]" -o tsv)
              az vm update -g "$AZURE_RG" -n "$AZURE_VM" \
                --set "storageProfile.dataDisks[$LUN].caching=ReadOnly" \
                || echo "::warning::Falha ao setar caching ReadOnly — prosseguindo"
            fi

            echo "Starting VM..."
            az vm start -g "$AZURE_RG" -n "$AZURE_VM"
          fi

          # Aguarda SSH responder (runner systemd reconecta sozinho assim que sobe)
          echo "Aguardando VM ficar reachable em SSH (porta 22)..."
          for i in $(seq 1 30); do
            if timeout 5 bash -c "</dev/tcp/${{ secrets.VM_HOST }}/22" 2>/dev/null; then
              echo "VM reachable apos ${i} tentativas (~$((i*10))s)"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::SSH nao respondeu em 5 minutos — runner pode demorar pra conectar"

  # ─────────────────────────────────────────────────────────────────────
  # DEPLOY: roda DENTRO da VM via self-hosted runner
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    needs: preflight
    runs-on: [self-hosted, linux, azure]
    timeout-minutes: 7200  # GitHub self-hosted runner hard limit (5 days)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Stop legacy warm-cache daemon + disable auto-update timers FIRST ──
      # Antes de qualquer trabalho pesado, paramos:
      #   1. Daemon antigo cruza-warm-cache (--loop), que disputa I/O.
      #   2. Timers do unattended-upgrade — eles disparam systemctl daemon-reexec
      #      que mata processos longos (warm de 12-18h foi morto antes por isso).
      # Roda incondicionalmente para idempotencia.
      - name: Stop legacy warm-cache daemon and mask auto-update timers
        run: |
          set +e
          if systemctl is-active --quiet cruza-warm-cache; then
            echo "Parando cruza-warm-cache antigo..."
            sudo systemctl stop cruza-warm-cache
          fi
          if systemctl is-enabled --quiet cruza-warm-cache; then
            echo "Desabilitando cruza-warm-cache antigo..."
            sudo systemctl disable cruza-warm-cache
          fi
          # Mata qualquer processo orfao rodando warm_cache --loop diretamente.
          sudo pkill -f 'warm_cache.*--loop' 2>/dev/null || true

          # Mask timers de auto-update (idempotente — symlink para /dev/null).
          # Sem isso, apt-daily-upgrade.timer dispara systemctl daemon-reexec que
          # envia SIGTERM para todos os servicos, matando warms longos.
          # `mask` eh mais forte que `disable`: nao pode ser ativado nem por dependencia.
          for unit in apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
            if systemctl is-enabled "$unit" 2>/dev/null | grep -qE '^(static|enabled|alias)$'; then
              echo "Masking $unit..."
              sudo systemctl mask "$unit"
            fi
          done

          exit 0

      # ── Clean previous failed state (manual trigger only) ──
      - name: Clean previous state
        if: inputs.clean == true
        run: |
          set -e
          echo "=== Cleaning previous deploy state ==="
          rm -f ${{ env.PROJECT_DIR }}/.initialized
          if command -v psql &> /dev/null; then
            cd ${{ env.PROJECT_DIR }} && source .env 2>/dev/null || true
            PGPASSWORD="${POSTGRES_PASSWORD:-${{ secrets.DB_PASSWORD }}}" psql -U govbr -d govbr -c "
              DO \$\$ DECLARE r RECORD;
              BEGIN
                FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                  EXECUTE 'DROP TABLE IF EXISTS ' || quote_ident(r.tablename) || ' CASCADE';
                END LOOP;
              END \$\$;
            " || true
          fi
          echo "=== Clean complete ==="

      # ── Install PostgreSQL 16 + system deps ──
      - name: Install system dependencies
        run: |
          set -e

          # Python + git + tor
          if ! dpkg -s python3-venv >/dev/null 2>&1 || ! dpkg -s tor >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y python3-venv python3-pip git curl wget gnupg2 lsb-release tor torsocks
            sudo systemctl enable tor
            sudo systemctl start tor
          fi
          sudo systemctl start tor 2>/dev/null || true

          # PostgreSQL 16
          if ! dpkg -s postgresql-16 >/dev/null 2>&1; then
            echo "=== Installing PostgreSQL 16 ==="
            sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
            sudo apt update
            sudo apt install -y postgresql-16 postgresql-contrib-16

            # Move data dir to /data disk if available (OS disk is only 30GB)
            if mountpoint -q /data 2>/dev/null; then
              sudo systemctl stop postgresql
              sudo mkdir -p /data/postgresql/16/main
              sudo chown -R postgres:postgres /data/postgresql
              sudo rsync -av /var/lib/postgresql/16/main/ /data/postgresql/16/main/
              sudo sed -i "s|data_directory = '/var/lib/postgresql/16/main'|data_directory = '/data/postgresql/16/main'|" /etc/postgresql/16/main/postgresql.conf
              sudo systemctl start postgresql
              echo "=== PG data dir moved to /data ==="
            fi

            # Create user + database
            sudo -u postgres createuser -s govbr 2>/dev/null || true
            sudo -u postgres createdb -O govbr govbr 2>/dev/null || true
            sudo -u postgres psql -c "ALTER USER govbr WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            sudo -u postgres psql -d govbr -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

            # Tuning inicial hardcoded (sera sobrescrito pelo step "Apply PostgreSQL auto-tuning"
            # logo abaixo, que detecta a RAM real da VM). Mantido aqui apenas para que o postgres
            # consiga subir pela primeira vez sem depender de ordem de execucao.
            echo -e "shared_buffers = 2GB\neffective_cache_size = 6GB\nwork_mem = 64MB\nmaintenance_work_mem = 512MB\nmax_wal_size = 4GB\ncheckpoint_completion_target = 0.9\nrandom_page_cost = 1.1" | sudo tee /etc/postgresql/16/main/conf.d/tuning.conf > /dev/null

            sudo sed -i 's/local\s\+all\s\+all\s\+peer/local all all md5/' /etc/postgresql/16/main/pg_hba.conf
            sudo systemctl restart postgresql
            echo "=== PostgreSQL 16 installed ==="
          fi
          sudo systemctl start postgresql

      # ── Deploy code + install Python deps ──
      - name: Deploy code
        run: |
          set -e

          # Clone if missing
          if [ ! -d "${{ env.PROJECT_DIR }}/.git" ]; then
            cd /home/govbr
            git clone https://github.com/${{ github.repository }}.git govbr-project
          fi

          cd ${{ env.PROJECT_DIR }}

          # Write .env from secrets
          echo "${{ secrets.ENV_FILE }}" > .env

          # Ensure data dir
          source .env
          DATA="${DATA_DIR:-/data/raw-data}"
          mkdir -p "$DATA"

          # Pull latest
          git fetch origin main
          git reset --hard origin/main

          # Python venv
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install --upgrade pip -q
          pip install -e ".[web]" -q

          echo "=== Code deployed. Data dir: $DATA ==="

      # ── Apply PostgreSQL auto-tuning based on detected RAM ──
      # Idempotente: roda em todo deploy. Detecta RAM via /proc/meminfo e ajusta
      # shared_buffers / effective_cache / work_mem / maintenance_work_mem.
      # Tambem instala um systemd unit (pg-autotune.service) + drop-in que torna
      # ele DEPENDENCIA HARD do postgres, garantindo re-tuning automatico apos
      # resize de VM (preflight/postflight).
      - name: Apply PostgreSQL auto-tuning
        run: |
          set -euo pipefail
          cd ${{ env.PROJECT_DIR }}

          sudo install -m 0755 deploy/pg-autotune.sh /usr/local/bin/pg-autotune.sh
          sudo install -m 0644 deploy/pg-autotune.service /etc/systemd/system/pg-autotune.service

          # Drop-in que faz postgresql@16-main.service depender de pg-autotune.service.
          sudo mkdir -p /etc/systemd/system/postgresql@16-main.service.d
          sudo install -m 0644 deploy/pg-autotune-pg-dropin.conf \
            /etc/systemd/system/postgresql@16-main.service.d/99-autotune.conf

          sudo systemctl daemon-reload
          sudo systemctl enable pg-autotune.service

          # Captura hash do tuning antes/depois para decidir se precisa restart.
          # IMPORTANT: pg-autotune.sh nao escreve timestamp no arquivo, entao o
          # hash so muda se a RAM detectada mudou (ex: apos resize de VM).
          OLD_HASH=$(sudo md5sum /etc/postgresql/16/main/conf.d/tuning.conf 2>/dev/null | awk '{print $1}' || echo "none")
          sudo /usr/local/bin/pg-autotune.sh
          NEW_HASH=$(sudo md5sum /etc/postgresql/16/main/conf.d/tuning.conf | awk '{print $1}')

          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "Tuning mudou ($OLD_HASH → $NEW_HASH), reiniciando postgres..."
            sudo systemctl restart postgresql
          else
            echo "Tuning inalterado, no-op."
          fi

          # Mostra config atual para audit log
          sudo cat /etc/postgresql/16/main/conf.d/tuning.conf

      # ── Verify disk space ──
      - name: Verify disk space
        run: |
          set -e
          echo "=== Disk status ==="
          df -h / /data 2>/dev/null || df -h /

          if mountpoint -q /data 2>/dev/null; then
            AVAIL_GB=$(df --output=avail /data | tail -1 | awk '{print int($1/1048576)}')
          else
            AVAIL_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
          fi

          echo "Available: ${AVAIL_GB}GB"
          if [ "$AVAIL_GB" -lt 50 ]; then
            echo "::error::Insufficient disk space: ${AVAIL_GB}GB (need 50GB+)"
            exit 1
          fi

      # ── Test download connectivity (only when actually downloading) ──
      - name: Test download sources
        if: (inputs.etl_phase == 'all' && inputs.skip_download != 'true') || inputs.etl_phase == '1'
        continue-on-error: true
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          systemctl is-active tor >/dev/null 2>&1 \
            && echo "  Tor service: ACTIVE" \
            || echo "  Tor service: INACTIVE"
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          python -m etl.probe_sources

      # ── Code sync only (web) — skip all ETL ──
      - name: "Code sync only"
        if: inputs.etl_phase == 'web'
        run: echo "=== Code sync only — skipping ETL ==="

      # ── Full ETL (first run or etl_phase=all) ──
      - name: "ETL: Full pipeline"
        if: inputs.etl_phase == 'all'
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate

          if [ -f ".initialized" ]; then
            echo "Already initialized — running incremental ETL"
          fi

          SKIP_DL="${{ inputs.skip_download }}"
          if [ "$SKIP_DL" = "true" ]; then
            echo "=== Skipping download, starting from phase 2 ==="
            python -m etl.run_all 2 2>&1
          else
            echo "=== Full ETL ==="
            python -m etl.run_all 2>&1
          fi

          # Verify key tables exist
          if python3 -c "from etl.db import get_conn, table_count; conn = get_conn(); n = table_count(conn, 'empresa'); print(f'empresa: {n}'); exit(0 if n > 0 else 1)" 2>/dev/null; then
            touch .initialized
            echo "=== ETL complete ==="
          else
            echo "::error::ETL incomplete — key tables missing"
            python -m etl.verify 2>/dev/null || true
            exit 1
          fi

      # ── SQL only (indices + normalization + views — NO schema drop/create) ──
      - name: "ETL: SQL only"
        if: inputs.etl_phase == 'sql'
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== Applying SQL changes (indices, normalization, views) ==="
          echo "NOTA: etl.01_schema NAO eh executado aqui — ele faz DROP+CREATE e apagaria dados existentes"

          # 10_indices: nao-idempotente (CREATE INDEX falha se ja existe). Soft-fail.
          python -m etl.10_indices 2>&1 || echo "::warning::etl.10_indices falhou (provavelmente ja aplicado)"

          # 15_normalizar: usa ADD COLUMN IF NOT EXISTS, idempotente. Soft-fail por seguranca.
          python -m etl.15_normalizar 2>&1 || echo "::warning::etl.15_normalizar falhou (provavelmente ja aplicado)"

          # 21_views: dropa+recria todas as MVs. SE ESSE FALHAR, queremos hard-fail
          # para que o postflight NAO faca downsize da VM (deixa em 16GB para retomar).
          python -m etl.21_views 2>&1

      # ── Specific phase ──
      - name: "ETL: Phase ${{ inputs.etl_phase }}"
        if: inputs.etl_phase != 'sql' && inputs.etl_phase != 'all' && inputs.etl_phase != 'web'
        run: |
          set -e
          sudo systemctl restart tor 2>/dev/null || true
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== ETL from phase ${{ inputs.etl_phase }} ==="
          python -m etl.run_all "${{ inputs.etl_phase }}" 2>&1

      # ── Run fraud queries (opt-in, demora ~30min) ──
      - name: Run queries
        if: inputs.run_queries == true && inputs.etl_phase != 'web'
        run: |
          set -euo pipefail
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          echo "=== Running all queries ==="
          python -m etl.run_queries 2>&1 | tail -100

      # ── Deploy web services ──
      - name: Deploy web frontend and cache warmer
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}

          # Install nginx if missing
          if ! dpkg -s nginx >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y nginx
          fi

          # Configure nginx reverse proxy
          sudo cp deploy/nginx-cruza.conf /etc/nginx/sites-available/cruza
          sudo ln -sf /etc/nginx/sites-available/cruza /etc/nginx/sites-enabled/cruza
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl reload nginx
          sudo systemctl enable nginx

          # Install systemd services. cruza-warm-cache eh oneshot (sem [Install]):
          # apenas o arquivo eh copiado, sem enable/start. Disparado pelo step
          # "Warm cache" abaixo via systemctl start (que respeita o EnvironmentFile
          # e User=govbr da unidade).
          sudo cp deploy/cruza-web.service /etc/systemd/system/
          sudo cp deploy/cruza-warm-cache.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable cruza-web

          # Restart cruza-web to pick up new code.
          sudo systemctl restart cruza-web

          echo "=== Web services deployed ==="
          systemctl is-active nginx && echo "nginx: RUNNING" || echo "nginx: FAILED"
          systemctl is-active cruza-web && echo "cruza-web: RUNNING" || echo "cruza-web: FAILED"
          echo "cruza-warm-cache: oneshot instalado (executado sob demanda)"

      # ── Atualizar estatisticas das tabelas hot ANTES do warm ──
      # Sem stats atualizadas, o planner pode escolher planos ruins (ex: hash
      # join em vez de nested loop, ou Bitmap Heap Scan em vez de Index Scan).
      # ANALYZE roda rapido e nao bloqueia leituras. Limitado as tabelas/MVs
      # mais consultadas pelo warm (evita ANALYZE em tabelas muito grandes
      # como rfb que nao mudam tao frequentemente).
      - name: ANALYZE hot tables before warm
        if: |
          inputs.warm_cache == true ||
          inputs.etl_phase == 'all' ||
          inputs.etl_phase == 'sql'
        run: |
          set -euo pipefail
          cd ${{ env.PROJECT_DIR }}
          source .env 2>/dev/null || true
          PASS="${POSTGRES_PASSWORD:-${{ secrets.DB_PASSWORD }}}"
          echo "=== ANALYZE em tabelas hot ==="
          for tbl in tce_pb_despesa pgfn_divida estabelecimento socio mv_pessoa_pb mv_empresa_governo mv_empresa_pb mv_servidor_pb_risco mv_municipio_pb_mapa mv_municipio_pb_kpi_score mv_q67_dated_pb; do
            echo "  ANALYZE $tbl..."
            PGPASSWORD="$PASS" psql -U govbr -d govbr -c "ANALYZE $tbl" 2>&1 | tail -1
          done
          echo "=== ANALYZE complete ==="

      # ── Drop web_cache (opcional, padrao OFF) ──
      # Por padrao NAO truncamos o cache mesmo apos ETL/SQL: o warm faz UPSERT
      # (INSERT ... ON CONFLICT DO UPDATE), entao cada muni X / query Y eh
      # substituido assim que o warm chegar nele. Cache antigo serve durante
      # as 12-18h do warm, evitando que o site fique sem cache hit.
      #
      # Trade-off: durante a janela do warm, algumas munis exibem dados
      # baseados em logica de query/MV anterior. Esse risco eh ACEITAVEL para
      # mudancas tipicas (registry.py com nova versao de query). Mas para
      # mudancas de SCHEMA (ex: coluna removida em web_cache), use
      # drop_cache=true para forcar TRUNCATE.
      #
      # Idempotente em VM nova (DO block guarda a existencia da tabela).
      - name: Drop web_cache (only if drop_cache=true)
        if: |
          inputs.drop_cache == true &&
          (inputs.warm_cache == true ||
           inputs.etl_phase == 'all' ||
           inputs.etl_phase == 'sql')
        run: |
          set -euo pipefail
          cd ${{ env.PROJECT_DIR }}
          source .env 2>/dev/null || true
          PASS="${POSTGRES_PASSWORD:-${{ secrets.DB_PASSWORD }}}"
          echo "=== TRUNCATE web_cache (drop_cache=true) ==="
          PGPASSWORD="$PASS" psql -U govbr -d govbr -c "
            DO \$\$
            BEGIN
              IF to_regclass('public.web_cache') IS NOT NULL THEN
                EXECUTE 'TRUNCATE web_cache';
                RAISE NOTICE 'web_cache truncated';
              ELSE
                RAISE NOTICE 'web_cache nao existe ainda — nada a truncar';
              END IF;
            END \$\$;
          "

      # ── Configure warm cache resume mode ──
      # Se drop_cache=false (default): cache eh preservado, ativa resume mode
      # (skip 24h) pra retomar warms interrompidos rapidamente. Trabalho ja
      # feito eh preservado via UPSERT.
      # Se drop_cache=true: cache foi TRUNCATE-ado, sem o que skip-ar.
      - name: Configure warm cache resume mode
        if: |
          inputs.warm_cache == true ||
          inputs.etl_phase == 'all' ||
          inputs.etl_phase == 'sql'
        run: |
          set -euo pipefail
          if [ "${{ inputs.drop_cache }}" = "true" ]; then
            SKIP_HRS=0
            echo "Full rebuild mode (drop_cache=true)"
          else
            SKIP_HRS=24
            echo "Resume mode: pula munis cacheados nas ultimas 24h"
          fi
          sudo mkdir -p /etc/systemd/system/cruza-warm-cache.service.d
          cat <<EOF | sudo tee /etc/systemd/system/cruza-warm-cache.service.d/runtime-env.conf > /dev/null
          [Service]
          Environment=WARM_SKIP_RECENT_HOURS=$SKIP_HRS
          EOF
          sudo systemctl daemon-reload
          echo "WARM_SKIP_RECENT_HOURS=$SKIP_HRS configurado"

      # ── Invalidate selected cache keys ──
      # DELETE cirurgico no web_cache para queries afetadas por uma fix
      # especifica. Mais cirurgico que drop_cache=true (que apaga TUDO).
      # Aceita CSV de termos: para cada termo T, executa
      # DELETE FROM web_cache WHERE query_id LIKE '%T%'.
      # Sanitiza input: apenas [a-zA-Z0-9_:] permitidos por termo, para
      # evitar SQL injection via patterns LIKE arbitrarios.
      # Roda APOS Configure resume mode (que ja deixou skip=24h em modo
      # nao-drop), porque queremos que o warm subsequente retrate as
      # chaves deletadas (sem skip).
      - name: Invalidate selected cache keys
        if: inputs.invalidate_cache_keys != ''
        run: |
          set -euo pipefail
          cd ${{ env.PROJECT_DIR }}
          source .env 2>/dev/null || true
          PASS="${POSTGRES_PASSWORD:-${{ secrets.DB_PASSWORD }}}"
          KEYS_RAW="${{ inputs.invalidate_cache_keys }}"
          echo "=== Invalidate cache keys: $KEYS_RAW ==="

          # Constroi clausula WHERE com OR LIKE para cada termo. Sanitiza
          # cada termo via grep -E '^[A-Za-z0-9_:]+$' — qualquer caractere
          # fora desse conjunto FAZ falhar (pra evitar surpresa silenciosa).
          WHERE_CLAUSE=""
          IFS=',' read -ra TERMS <<< "$KEYS_RAW"
          for term in "${TERMS[@]}"; do
            term=$(echo "$term" | tr -d ' ')
            if [ -z "$term" ]; then continue; fi
            if ! echo "$term" | grep -qE '^[A-Za-z0-9_:]+$'; then
              echo "::error::invalidate_cache_keys term invalido: '$term' (apenas [A-Za-z0-9_:] permitidos)"
              exit 1
            fi
            if [ -n "$WHERE_CLAUSE" ]; then
              WHERE_CLAUSE="$WHERE_CLAUSE OR "
            fi
            WHERE_CLAUSE="${WHERE_CLAUSE}query_id LIKE '%${term}%'"
          done

          if [ -z "$WHERE_CLAUSE" ]; then
            echo "Nenhum termo valido — nada a invalidar."
            exit 0
          fi

          SQL="DELETE FROM web_cache WHERE $WHERE_CLAUSE"
          echo "SQL: $SQL"
          PGPASSWORD="$PASS" psql -U govbr -d govbr -c "
            DO \$\$
            DECLARE
              n INTEGER;
            BEGIN
              IF to_regclass('public.web_cache') IS NOT NULL THEN
                EXECUTE '$SQL';
                GET DIAGNOSTICS n = ROW_COUNT;
                RAISE NOTICE 'invalidated % web_cache rows', n;
              ELSE
                RAISE NOTICE 'web_cache nao existe — nada a invalidar';
              END IF;
            END \$\$;
          "

      # ── Warm cache (oneshot, ~12-18h em B4 com fixes do PR de speedup) ──
      # Auto: roda apos etl_phase=all ou sql (dados mudaram, queries mudaram).
      # Manual: roda em qualquer etl_phase quando warm_cache=true (incluindo
      # phase=N e phase=web).
      # Para etl_phase=N evitamos rodar automaticamente — rerodar uma fase
      # pontual nao necessariamente justifica 20h de warm. Usuario opta-in
      # explicitamente via warm_cache=true.
      #
      # continue-on-error: deixa postflight rodar mesmo se warm falhou
      # parcialmente (warm_cache.py exit 1 quando >5% das queries falham).
      # Postflight ainda executa downsize, evitando deixar VM em B4 ($108/mes)
      # quando ETL succeeded mas warm teve issues. Falhas sao visiveis via
      # job result no GitHub UI.
      - name: Warm cache
        if: |
          inputs.warm_cache == true ||
          inputs.etl_phase == 'all' ||
          inputs.etl_phase == 'sql'
        continue-on-error: true
        run: |
          set -uo pipefail  # SEM -e: queremos capturar exit do systemctl
          echo "=== Warming web_cache table (esperado ~3-5h pos-fix bpchar) ==="
          echo "Inicio: $(date -Iseconds)"

          # Captura timestamp ANTES de qualquer coisa: usado pelo journalctl
          # para nao perder logs emitidos entre o start do servico e o
          # journalctl entrar em modo follow. Sem isso, ha race onde o
          # oneshot emite as primeiras linhas (ex: "=== Ciclo 1 iniciado ===")
          # antes do tail estar pronto e elas nunca aparecem no UI.
          START_TS=$(date '+%Y-%m-%d %H:%M:%S')

          # Stream do journalctl em background para acompanhar progresso ao
          # vivo no UI do GitHub Actions. Sem isso, o step parece travado por
          # horas ate o systemctl --wait retornar.
          # -f follow, --since "$START_TS" pega tudo desde antes do start
          # (NAO usa -n 0 porque queremos replay desde o START_TS).
          # O sed prefixa as linhas pra distinguir do output direto do step.
          sudo journalctl -u cruza-warm-cache -f --since "$START_TS" --no-pager 2>&1 \
            | sed -u 's/^/[journal] /' &
          TAIL_PID=$!
          # Garante que o tail morre quando o step termina, mesmo em erro.
          trap 'kill $TAIL_PID 2>/dev/null || true; wait $TAIL_PID 2>/dev/null || true' EXIT

          # systemctl start --wait com Type=oneshot bloqueia ate o ExecStart
          # terminar e propaga exit code do processo. Usa EnvironmentFile,
          # User=govbr, journal logging — tudo da unidade.
          # GitHub Actions default shell tem -e; capturamos via if/else
          # para que STATUS=$? e o post-processing rodem mesmo em falha.
          if sudo systemctl start --wait cruza-warm-cache; then
            STATUS=0
          else
            STATUS=$?
          fi

          # Aguarda tail capturar ultimas linhas do journal antes de matar.
          sleep 3
          kill $TAIL_PID 2>/dev/null || true
          wait $TAIL_PID 2>/dev/null || true

          echo "Fim:    $(date -Iseconds)"
          sudo systemctl status cruza-warm-cache --no-pager --lines=20 || true
          if [ "$STATUS" -ne 0 ]; then
            echo "::warning::cruza-warm-cache encerrou com falha (>5% queries falharam)"
            exit "$STATUS"
          fi
          echo "=== Cache warming complete ==="

      # ── Verify ──
      - name: Verify database
        if: always()
        run: |
          set -e
          cd ${{ env.PROJECT_DIR }}
          source venv/bin/activate
          python3 -m etl.verify 2>/dev/null || echo "Verify script not available"

  # ─────────────────────────────────────────────────────────────────────
  # POSTFLIGHT: redimensiona a VM de volta para o tamanho web (B2as_v2)
  # sempre que a preflight fez upsize. Mantem o estado "limpo" da VM
  # otimizado para servir web (~$55/mes vs ~$108/mes do tamanho ETL).
  #
  # Roda mesmo se o "Warm cache" falhou parcialmente (continue-on-error
  # no step do warm garante que o deploy job sai com sucesso). A condicao
  # `always() + needs.deploy.result != cancelled/skipped` evita o caso onde
  # ETL falhou de verdade no meio (a VM fica em B4 para o usuario retomar
  # com etl_phase=N sem mais um resize).
  #
  # A condicao deve ESPELHAR a logica do preflight "Decide target VM size":
  # se preflight fez upsize, postflight tenta downsize.
  # ─────────────────────────────────────────────────────────────────────
  postflight:
    needs: deploy
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (inputs.etl_phase != 'web' || inputs.warm_cache == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resize VM down and convert disk SKU back
        run: |
          set -e
          TARGET_SIZE="$VM_SIZE_WEB"
          TARGET_DISK_SKU="$DISK_SKU_LIGHT"

          CURRENT_SIZE=$(az vm show -g "$AZURE_RG" -n "$AZURE_VM" --query hardwareProfile.vmSize -o tsv)
          CURRENT_DISK_SKU=$(az disk show -g "$AZURE_RG" -n "$DATA_DISK" --query sku.name -o tsv)

          echo "Current VM size:   $CURRENT_SIZE"
          echo "Target VM size:    $TARGET_SIZE"
          echo "Current disk SKU:  $CURRENT_DISK_SKU"
          echo "Target disk SKU:   $TARGET_DISK_SKU"

          NEEDS_RESIZE="false"
          NEEDS_DISK_CHANGE="false"
          [ "$CURRENT_SIZE" != "$TARGET_SIZE" ] && NEEDS_RESIZE="true"
          [ "$CURRENT_DISK_SKU" != "$TARGET_DISK_SKU" ] && NEEDS_DISK_CHANGE="true"

          if [ "$NEEDS_RESIZE" = "false" ] && [ "$NEEDS_DISK_CHANGE" = "false" ]; then
            echo "VM ja esta no tamanho web e disco no SKU correto. Nada a fazer."
            exit 0
          fi

          # Valida disponibilidade antes de deallocate
          if [ "$NEEDS_RESIZE" = "true" ]; then
            AVAILABLE=$(az vm list-vm-resize-options -g "$AZURE_RG" -n "$AZURE_VM" --query "[].name" -o tsv)
            if ! echo "$AVAILABLE" | grep -qx "$TARGET_SIZE"; then
              echo "::error::Tamanho $TARGET_SIZE indisponivel — abortando, VM continua em $CURRENT_SIZE"
              exit 1
            fi
          fi

          echo "Deallocating VM..."
          az vm deallocate -g "$AZURE_RG" -n "$AZURE_VM"

          # 1. Resize VM down (com rollback)
          if [ "$NEEDS_RESIZE" = "true" ]; then
            echo "Downsize: $CURRENT_SIZE → $TARGET_SIZE"
            if ! az vm resize -g "$AZURE_RG" -n "$AZURE_VM" --size "$TARGET_SIZE"; then
              echo "::warning::Resize falhou, restaurando para $CURRENT_SIZE..."
              az vm resize -g "$AZURE_RG" -n "$AZURE_VM" --size "$CURRENT_SIZE" || true
              az vm start -g "$AZURE_RG" -n "$AZURE_VM" || true
              echo "::error::Downsize para $TARGET_SIZE falhou — VM restaurada"
              exit 1
            fi
          fi

          # 2. Downgrade disk SKU. Se atingir limite Azure (2/24h), falha eh
          # benigna: disco fica em Premium ($35/mes extra) ate o proximo
          # postflight. Nao bloqueamos o downsize da VM por causa disso.
          if [ "$NEEDS_DISK_CHANGE" = "true" ]; then
            echo "Disk SKU: $CURRENT_DISK_SKU → $TARGET_DISK_SKU"
            if ! az disk update -g "$AZURE_RG" -n "$DATA_DISK" --sku "$TARGET_DISK_SKU"; then
              echo "::warning::Conversao de disco falhou (provavelmente atingiu limite 2/24h)."
              echo "::warning::Disco permanece em $CURRENT_DISK_SKU."
              echo "::warning::Sera convertido no proximo deploy ou manualmente."
            fi
          fi

          echo "Starting VM..."
          az vm start -g "$AZURE_RG" -n "$AZURE_VM"

          # Aguarda SSH responder antes de declarar sucesso
          echo "Aguardando VM ficar reachable em SSH apos downsize..."
          for i in $(seq 1 30); do
            if timeout 5 bash -c "</dev/tcp/${{ secrets.VM_HOST }}/22" 2>/dev/null; then
              echo "VM reachable apos ${i} tentativas (~$((i*10))s)"
              echo "Resize concluido. pg-autotune.service vai re-tunar postgres no boot."
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSH nao respondeu em 5 minutos apos downsize — VM pode estar com problema"
          exit 1
