# fail2ban filter: detecta 429 (Too Many Requests) no nginx access log.
#
# Funciona com nginx access log padrao do Ubuntu:
#   /var/log/nginx/access.log
#
# Quando um IP gera 10 respostas 429 em 5 minutos (definido em
# transparenciapb.local), o IP eh banido por 1h via iptables.
#
# Instalado em /etc/fail2ban/filter.d/transparenciapb-429.conf por
# deploy/setup-fail2ban.sh.

[Definition]
# Match: linha de log do nginx onde o status code eh 429.
# Formato default Ubuntu nginx:
#   <ip> - <user> [<date>] "GET /api/... HTTP/1.1" 429 ...
failregex = ^<HOST> .*"(GET|POST|PUT|DELETE|HEAD|PATCH) [^"]*" 429
ignoreregex =
