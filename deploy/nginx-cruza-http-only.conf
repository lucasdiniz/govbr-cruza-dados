# Bootstrap nginx config — HTTP only, com path de ACME challenge.
#
# Usado SOMENTE durante a primeira emissão do cert Let's Encrypt
# (ou se o cert for revogado/perdido). Logo após `certbot certonly --webroot`
# bem-sucedido, o setup-letsencrypt.sh substitui este arquivo pelo
# nginx-cruza.conf completo (HTTP redirect + HTTPS).

server {
    listen 80;
    listen [::]:80;
    server_name transparenciapb.org www.transparenciapb.org;

    # ACME HTTP-01 challenge (Let's Encrypt webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Enquanto não temos cert, servimos a app direto via HTTP.
    # Assim o site fica no ar mesmo durante o bootstrap.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
