# nginx config principal (HTTPS + rate limit + headers).
#
# Pré-requisitos:
# - Cert Let's Encrypt já emitido em /etc/letsencrypt/live/transparenciapb.org/.
#   Se ausente, deploy/setup-letsencrypt.sh emite via certbot webroot.
# - Zone declarations em /etc/nginx/conf.d/transparenciapb-zones.conf
#   (vem de deploy/nginx-rate-limit-zones.conf via setup-letsencrypt.sh).
#
# Estratégia de rate limit (ver nginx-rate-limit-zones.conf):
#   general    -> 60 r/s + burst 120 (page renders, static não-hashed)
#   api_light  -> 10 r/s + burst 20  (autocomplete, mapa/pb, heatmap)
#   api_heavy  -> 2 r/s  + burst 5   (drilldowns, batch, kpis, run, count, top)
#   perip      -> connection cap (max simultâneas por IP)

# HTTP :80 -> redirect para HTTPS (mantendo ACME challenge path para renovação)
server {
    listen 80;
    listen [::]:80;
    server_name transparenciapb.org www.transparenciapb.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS www -> redirect para apex (canonicaliza host)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.transparenciapb.org;

    ssl_certificate     /etc/letsencrypt/live/transparenciapb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transparenciapb.org/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Security headers tambem no www block — visitors via www.* recebem HSTS
    # imediatamente em vez de so na 2a requisicao apos o redirect.
    # HSTS: 6 meses (15768000s). Pos-validacao subir pra 2 anos (63072000) +
    # includeSubDomains + preload e submeter em https://hstspreload.org/.
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    return 301 https://transparenciapb.org$request_uri;
}

# HTTPS apex -> aplicação
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transparenciapb.org;

    ssl_certificate     /etc/letsencrypt/live/transparenciapb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transparenciapb.org/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Path do projeto na VM (alias para servir static direto do nginx,
    # evitando proxy_pass por requisição estática).
    set $project_root /home/govbr/govbr-project;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml application/manifest+json application/xml text/xml application/xml+rss application/atom+xml application/rss+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ─── Security headers (aplicam a todas as respostas com `always`) ───
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), interest-cohort=()" always;
    # HSTS: 6 meses. Pos-validacao prolongada (~2 meses sem incidente HTTPS)
    # subir pra 2 anos (63072000) + includeSubDomains + preload e submeter
    # em https://hstspreload.org/. Manter conservador ate la pra permitir
    # rollback rapido caso algum subpath precise de HTTP (ex: integracao).
    add_header Strict-Transport-Security "max-age=15768000" always;
    # CSP em modo Report-Only: avisa de violações sem bloquear. Após
    # observar logs sem falsos positivos, mover pra Content-Security-Policy
    # ativo. unsafe-inline necessário porque temos inline scripts dinâmicos
    # (theme/font-size pre-render, COLUMN_META, cidade bootstrap).
    # Google Fonts: style-src precisa de fonts.googleapis.com (CSS) e
    # font-src de fonts.gstatic.com (woff2). Sem isso, mover de Report-Only
    # pra modo enforced quebraria as fontes.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # Limite de upload
    client_max_body_size 10m;

    # ─── Rate limit error handling ───
    error_page 429 /429.html;
    location = /429.html {
        alias $project_root/web/static/429.html;
        internal;
        add_header Cache-Control "no-cache" always;
    }

    # ─── Static assets ───
    # Manifest do build pipeline: SEM cache estável (ponto de invalidação).
    location = /static/dist/manifest.json {
        alias $project_root/web/static/dist/manifest.json;
        add_header Cache-Control "no-cache" always;
    }

    # Bundles hashed: cache imutavel 1 ano (filename inclui sha256).
    location /static/dist/ {
        alias $project_root/web/static/dist/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Sourcemaps tambem cacheados imutavel (nome hashed).
        types {
            application/javascript js;
            text/css css;
            application/json map;
        }
    }

    # Service worker: SEM cache (deve sempre buscar versão nova).
    # /sw.js é route do FastAPI (web/main.py:351), nao arquivo estático.
    location = /sw.js {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static não-hashed (vendor, geo, icons, manifest webmanifest, 429.html):
    # cache 1 dia, servido direto pelo nginx (bypass FastAPI).
    location /static/ {
        alias $project_root/web/static/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ─── API endpoints (rate limit estrito + UA blocklist) ───
    # /api/contato: estritissimo (proteção da quota Resend free 3000/mes).
    # Defesa em profundidade: app-level throttle em web/contato.py:is_throttled
    # tambem checa por IP/email no PG.
    location = /api/contato {
        if ($tpb_block_api_ua) { return 403; }
        limit_req zone=api_heavy burst=2 nodelay;
        limit_conn perip 2;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 75s;
    }

    # API HEAVY: drilldowns, batch, kpis, perfil, run, count, top, cache.
    # Estes podem rodar queries SQL com timeout até 90s. POOL_MAX=4, então
    # 1 IP nao pode ocupar todo o pool sozinho.
    location ~ ^/api/(servidor|fornecedor|empenho|licitacao)/detalhes$ {
        if ($tpb_block_api_ua) { return 403; }
        limit_req zone=api_heavy burst=5 nodelay;
        limit_conn perip 4;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
    }
    location ~ ^/api/(batch|kpis|perfil|run|count|top|cache|export)(/|$) {
        if ($tpb_block_api_ua) { return 403; }
        limit_req zone=api_heavy burst=5 nodelay;
        limit_conn perip 4;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
    }
    # API LIGHT: autocomplete, mapa/pb (cached MV), heatmap (cached).
    location /api/ {
        if ($tpb_block_api_ua) { return 403; }
        limit_req zone=api_light burst=20 nodelay;
        limit_conn perip 8;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 75s;
    }

    # ─── GoAccess real-time traffic dashboard (admin-only) ───
    # Servido por nginx como static (alias) + WebSocket proxy pro daemon
    # goaccess em 127.0.0.1:7890. Ambas as locations protegidas por
    # basic-auth (/etc/nginx/.htpasswd-traffic, gerenciado por
    # deploy/setup-goaccess.sh).
    #
    # Se o GoAccess nao foi configurado ainda (.htpasswd-traffic ausente),
    # nginx retorna 500 nessas locations — comportamento aceitavel pra um
    # endpoint admin "nao ativado". Veja deploy/setup-goaccess.sh.
    #
    # WebSocket location PRIMEIRO no codigo (longest-prefix match do nginx
    # ja garante precedencia em prefix locations, mas mantemos a ordem
    # explicita pra leitura).

    # Redirect /_traffic (sem barra) -> /_traffic/. Sem isso, /_traffic
    # cai no location / (catch-all) e bate em FastAPI, que retorna 404
    # confundindo o admin. Exact match (=) tem precedencia maxima.
    location = /_traffic {
        return 301 /_traffic/;
    }
    location /_traffic/ws {
        # WS sem auth_basic: navegadores (Safari/Chrome/Firefox) NAO enviam
        # o header Authorization no upgrade handshake do WebSocket, mesmo
        # depois de autenticar no HTML em /_traffic/. Sem essa relaxacao,
        # o JS do goaccess fica preso em "Authorizing WebSocket session...".
        #
        # Mitigacoes mantidas:
        #   - WS daemon bound em 127.0.0.1 (nao expoe porta publica)
        #   - rate limit + connection cap (zone general)
        #   - path obscuro (/_traffic/ws nao linkado de lugar nenhum publico)
        #   - dados expostos sao stats agregadas e anonimizadas
        #     (anonymize-ip true no goaccess.conf, ultimo octeto zerado)
        # Rate limit + connection cap pra frear brute-force de scanner.
        limit_req zone=general burst=10 nodelay;
        limit_conn perip 4;
        proxy_pass http://127.0.0.1:7890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WS de longa duracao — aumenta read timeout pra evitar drop a cada 60s.
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
    location /_traffic/raw {
        # Plain-text view das ultimas 1000 linhas do access.log,
        # atualizado a cada 5s pelo cruza-traffic-tail.service.
        # Util pra inspecao rapida de requests recentes (IP, path, UA, status).
        auth_basic "Restricted — Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-traffic;
        limit_req zone=general burst=10 nodelay;
        limit_conn perip 4;
        alias /var/www/traffic/raw.txt;
        default_type text/plain;
        # Refresh manual no browser. raw.txt eh regenerado a cada 5s, entao
        # sem cache; Cache-Control imediato.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        # Forca download/inline em UTF-8 (nginx default eh latin1 pra text/plain).
        charset utf-8;
    }

    # ─── Umami analytics (self-hosted, dashboard admin-only) ───
    # Path /_traffic/analytics/* → proxied pra Node em 127.0.0.1:3001.
    # Umami v3 buildado com BASE_PATH=/_traffic/analytics (ver
    # deploy/setup-umami.sh), entao todos os assets, login, API e o proprio
    # tracker JS ficam sob esse prefixo. O servico systemd cruza-umami.service
    # roda local-only (HOSTNAME=127.0.0.1, PORT=3001).
    #
    # Distincao critica:
    #   - /_traffic/analytics/script.js   → PUBLICO (todo visitor carrega)
    #   - /_traffic/analytics/api/send    → PUBLICO (browser POST eventos)
    #   - /_traffic/analytics/...         → basic-auth + login do Umami
    #
    # A precedencia do nginx (exact-match > prefix mais longo) garante que
    # script.js e api/send sao servidos sem auth mesmo estando dentro de
    # /_traffic/analytics/. Mantemos rate limit em todas as locations.

    # /_traffic/analytics (sem trailing slash) NAO bate no prefix
    # /_traffic/analytics/ — se nao tratado, cairia no location /_traffic/
    # abaixo (proxy do GoAccess).
    #
    # Tentamos `return 308 /_traffic/analytics/` (com barra) na primeira
    # iteracao, mas Next.js v16 com basePath usa trailingSlash:false como
    # canonical: ao acessar /_traffic/analytics/ ele 308-redirect pra
    # /_traffic/analytics (sem barra). Combinacao = REDIRECT LOOP infinito
    # (browser aborta apos N redirects, vendo apenas o 308 final no log).
    #
    # Fix: tratar /_traffic/analytics como rota legitima do dashboard
    # (proxy direto pro Umami, mesma config admin com basic-auth). Umami
    # com basePath responde corretamente nessa URL canonica.
    location = /_traffic/analytics {
        auth_basic "Restricted — Analytics admin";
        auth_basic_user_file /etc/nginx/.htpasswd-traffic;
        limit_req zone=general burst=30 nodelay;
        limit_conn perip 8;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Tracker JS — publico (carregado pelo <script> em web/templates/base.html).
    location = /_traffic/analytics/script.js {
        limit_req zone=general burst=120 nodelay;
        limit_conn perip 20;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache 1h no browser pra reduzir requests repetidos; o tracker
        # raramente muda entre updates do Umami.
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Event ingestion — publico, recebe POST do tracker em cada pageview/evento.
    # Rate limit api_light (~10 r/s + burst 20) eh suficiente: 223 municipios
    # com trafego organico nunca chega perto.
    location = /_traffic/analytics/api/send {
        limit_req zone=api_light burst=20 nodelay;
        limit_conn perip 8;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # APIs admin do Umami — SEM basic-auth (so rate-limit + auth proprio).
    # Motivo: o frontend do dashboard envia `Authorization: Bearer <jwt>`
    # em toda chamada (src/components/hooks/useApi.ts), e o header
    # Authorization eh tambem o que o basic-auth do nginx consome — colocar
    # auth_basic aqui causa 401 antes de chegar no Umami, quebrando login
    # e qualquer acao no painel. A protecao desses endpoints fica por conta
    # do auth interno do Umami (bcrypt + JWT assinado com APP_SECRET).
    # Login bruteforce eh contido pelo rate limit api_light + conn cap.
    # Este prefix eh mais longo que /_traffic/analytics/ entao tem
    # precedencia (longest non-`^~` prefix match).
    location /_traffic/analytics/api/ {
        limit_req zone=api_light burst=20 nodelay;
        limit_conn perip 8;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Dashboard HTML/assets (login page, /_next/*, /share/*, etc) —
    # basic-auth + auth proprio do Umami (defesa em profundidade).
    # Trocar a senha default admin/umami no primeiro acesso e obrigatorio.
    # IMPORTANTE: apenas a UI cai aqui — as APIs do dashboard (acima)
    # usam Bearer JWT e NAO podem ter basic-auth (vide comentario acima).
    location /_traffic/analytics/ {
        auth_basic "Restricted — Analytics admin";
        auth_basic_user_file /etc/nginx/.htpasswd-traffic;
        limit_req zone=general burst=30 nodelay;
        limit_conn perip 8;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /_traffic/ {
        auth_basic "Restricted — Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-traffic;
        # Rate limit basic-auth: bloqueia automação que tenta password spraying.
        limit_req zone=general burst=10 nodelay;
        limit_conn perip 4;
        # GoAccess embute "port": 7890 no HTML (porta interna do daemon),
        # e o JS sempre usa esse port no URL do WebSocket — mesmo com
        # ws-url configurado pro dominio publico (bug upstream do goaccess
        # >=1.10). Reescreve on-the-fly pra 443 (porta HTTPS do nginx)
        # pra que o browser conecte via wss://transparenciapb.org/_traffic/ws
        # e nginx faca proxy pra 127.0.0.1:7890.
        sub_filter '"port": 7890' '"port": 443';
        sub_filter_once on;
        alias /var/www/traffic/;
        try_files $uri $uri/index.html =404;
        # HTML do goaccess e regenerado a cada poucos segundos — sem cache.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ─── Default: page renders e tudo mais ───
    location / {
        limit_req zone=general burst=120 nodelay;
        limit_conn perip 20;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
