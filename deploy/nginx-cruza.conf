# nginx config principal (HTTPS).
#
# Pré-requisito: cert Let's Encrypt já emitido em
# /etc/letsencrypt/live/transparenciapb.org/. Se ainda não existe,
# `deploy/setup-letsencrypt.sh` instala o config bootstrap (HTTP-only),
# emite o cert via certbot webroot e só então copia este arquivo.
#
# Renovação: certbot.timer (systemd) renova 2x/dia. Hook em
# /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh faz o reload.

# HTTP :80 -> redirect para HTTPS (mantendo path de ACME challenge para renovação)
server {
    listen 80;
    listen [::]:80;
    server_name transparenciapb.org www.transparenciapb.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS www -> redirect para apex (canonicaliza host)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.transparenciapb.org;

    ssl_certificate     /etc/letsencrypt/live/transparenciapb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transparenciapb.org/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    return 301 https://transparenciapb.org$request_uri;
}

# HTTPS apex -> aplicação
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name transparenciapb.org;

    ssl_certificate     /etc/letsencrypt/live/transparenciapb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transparenciapb.org/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS: começa conservador (1 dia). Após validar tudo em produção, subir
    # para 6 meses (15768000) ou 1 ano (31536000) e considerar `preload`.
    add_header Strict-Transport-Security "max-age=86400" always;

    # Limite de upload (não esperamos uploads grandes; ajustar se necessário)
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
