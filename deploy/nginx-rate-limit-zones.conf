# Rate limit + connection limit zones para TransparenciaPB.
#
# Este arquivo é incluído pelo nginx no contexto `http` via
# /etc/nginx/conf.d/*.conf. Zone declarations DEVEM viver em http context,
# nao dentro de server {} ou location {}.
#
# Estratégia (ver deploy/nginx-cruza.conf para uso):
#   general    -> 60 r/s + burst 120 (page renders / static não-hashed)
#   api_light  -> 10 r/s + burst 20  (autocomplete, mapa/pb, heatmap)
#   api_heavy  -> 2 r/s  + burst 5   (drilldown dialogs, batch, kpis, run, count, top)
#   perip      -> connection cap (concorrência simultânea)
#
# POOL_MAX=4 do FastAPI + timeouts até 90s (web/config.py): por isso
# api_heavy é estrito (1 IP não pode ocupar todo o pool sozinho).

limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=api_light:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_heavy:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# Rejeicao de rate limit deve ser 429, nao 503 (default).
limit_req_status 429;
limit_conn_status 429;
