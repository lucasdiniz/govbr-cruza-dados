# fail2ban jail: ban IPs que excedem rate limit (429) repetidamente.
#
# Threshold: 10 hits 429 em 5min = ban por 1h via iptables.
# Tunes em production se necessario (ban time, find time, max retry).
#
# Instalado em /etc/fail2ban/jail.d/transparenciapb-429.conf por
# deploy/setup-fail2ban.sh.

[transparenciapb-429]
enabled  = true
port     = http,https
filter   = transparenciapb-429
logpath  = /var/log/nginx/access.log
maxretry = 10
findtime = 300
bantime  = 3600
action   = iptables-multiport[name=tpb-429, port="http,https", protocol=tcp]
