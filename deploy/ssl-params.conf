# Mozilla "Intermediate" TLS profile + Let's Encrypt session settings.
# Compatível com nginx >=1.13. Atualizado: 2026-05.
# Fonte: https://ssl-config.mozilla.org/#server=nginx&config=intermediate
#
# Atenção: NÃO incluímos DHE/dhparam — só ECDHE. Isso evita ter que gerar
# dhparams.pem (lento) e ainda funciona com 100% dos browsers modernos.

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";

ssl_session_cache shared:LE_nginx_SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;
