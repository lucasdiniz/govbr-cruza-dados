# GoAccess config — dashboard real-time atras de nginx.
# Path final: /etc/goaccess/cruza-goaccess.conf
# Instalado por deploy/setup-goaccess.sh (substitui @@GOACCESS_DOMAIN@@).

# ── Input: nginx access.log no formato COMBINED (default da distro) ──
log-file /var/log/nginx/access.log
log-format COMBINED
date-format %d/%b/%Y
time-format %H:%M:%S

# ── Output HTML (servido por nginx como static via alias) ──
output /var/www/traffic/index.html
real-time-html true

# ── WebSocket: bind so em 127.0.0.1; exposicao publica via nginx /_traffic/ws ──
addr 127.0.0.1
port 7890
# JS embedded no HTML conecta neste WS URL (proxy via nginx).
ws-url wss://@@GOACCESS_DOMAIN@@/_traffic/ws

# ── Persistencia: sobrevive a restart do daemon e a log rotation ──
persist true
restore true
db-path /var/lib/goaccess/

# ── GeoIP ──
# GeoLite2-Country no formato .mmdb (libmaxminddb). Baixado pelo
# deploy/setup-goaccess.sh a partir de db-ip.com/free (lite version,
# sem signup). Atualizado mensalmente — pra refresh, basta rodar o
# setup-goaccess.sh de novo (idempotente).
geoip-database /var/lib/goaccess/dbip-country-lite.mmdb

# ── Comportamento ──
agent-list true
# 365 dias de retencao no DB persistente — suficiente pra analise YoY.
keep-last 365

# ── Filtragem de ruido ──
# Health-checks internos e ACME challenges nao sao trafego real.
exclude-ip 127.0.0.1
exclude-ip ::1

# ── Privacidade ──
# anonymize-ip removido: ele suprime a lista de user-agents por IP no
# dashboard (medida anti-reidentificacao do goaccess). Trade-off:
#  - IPs completos aparecem agora no painel "Visitor Hostnames and IPs"
#  - Em troca, e' possivel expandir cada IP e ver os user-agents
# Mitigacoes mantidas:
#  - Dashboard atras de basic-auth (so admin acessa)
#  - access.log nativo do nginx ja contem IPs completos (pre-existente)
#  - /_traffic/raw tambem expoe IPs completos (mesmo escopo de acesso)
# Pra anonimizar de novo no futuro: 'anonymize-ip true' (custa a feature
# de ver UAs).
